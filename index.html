<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 transition-colors duration-300">

<header class="flex justify-between items-center p-4 bg-indigo-600 text-white shadow-lg">
  <h1 class="text-2xl font-bold">Smart Expense Tracker</h1>
  <button id="toggleDark" class="bg-white text-indigo-600 px-3 py-1 rounded">Dark Mode</button>
</header>

<main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-semibold">Balance</h2>
    <p id="balance" class="text-2xl mt-2">$0</p>
  </div>
  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-semibold">Income</h2>
    <p id="income" class="text-2xl mt-2 text-green-500">$0</p>
  </div>
  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-semibold">Expenses</h2>
    <p id="expenses" class="text-2xl mt-2 text-red-500">$0</p>
  </div>

  <div class="md:col-span-1 bg-white p-4 rounded shadow">
    <h2 class="font-semibold mb-2">Add Transaction</h2>
    <form id="transactionForm" class="space-y-2">
      <input type="text" id="desc" placeholder="Description" class="w-full border p-2 rounded" required>
      <input type="number" id="amount" placeholder="Amount" class="w-full border p-2 rounded" required>
      <select id="type" class="w-full border p-2 rounded">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <select id="category" class="w-full border p-2 rounded">
        <option value="Salary">Salary</option>
        <option value="Household">Food</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Transport">Transport</option>
        <option value="Education">Education</option>
      </select>
      <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded mt-2 hover:bg-indigo-700 transition">Add</button>
    </form>
  </div>

  <div class="md:col-span-2 bg-white p-4 rounded shadow overflow-y-auto max-h-96">
    <h2 class="font-semibold mb-2">Transactions</h2>
    <ul id="transactionList" class="space-y-2"></ul>
  </div>

<div class="md:col-span-1 bg-white p-4 rounded shadow flex justify-center items-center">
  <canvas id="expenseChart" class="w-48 h-48"></canvas>
</div>


</main>

<script>
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

const balanceEl = document.getElementById('balance');
const incomeEl = document.getElementById('income');
const expensesEl = document.getElementById('expenses');
const transactionList = document.getElementById('transactionList');
const transactionForm = document.getElementById('transactionForm');
const expenseChart = document.getElementById('expenseChart');

function updateLocalStorage() {
    localStorage.setItem('transactions', JSON.stringify(transactions));
}

function updateUI() {
    let income = 0, expense = 0;
    transactionList.innerHTML = '';
    
    transactions.forEach((t, i) => {
        if(t.type === 'income') income += +t.amount;
        else expense += +t.amount;

        const li = document.createElement('li');
        li.className = `flex justify-between p-2 border rounded ${t.type === 'income' ? 'bg-green-100' : 'bg-red-100'}`;
        li.innerHTML = `
          <span>${t.desc} (${t.category})</span>
          <span>$${t.amount}</span>
          <button onclick="removeTransaction(${i})" class="text-red-500 font-bold">X</button>
        `;
        transactionList.appendChild(li);
    });

    balanceEl.innerText = `$${income - expense}`;
    incomeEl.innerText = `$${income}`;
    expensesEl.innerText = `$${expense}`;

    updateChart();
}

function removeTransaction(index) {
    transactions.splice(index, 1);
    updateLocalStorage();
    updateUI();
}

transactionForm.addEventListener('submit', e => {
    e.preventDefault();
    const desc = document.getElementById('desc').value;
    const amount = document.getElementById('amount').value;
    const type = document.getElementById('type').value;
    const category = document.getElementById('category').value;

    if(desc && amount) {
        transactions.push({desc, amount, type, category});
        updateLocalStorage();
        updateUI();
        transactionForm.reset();
    }
});

let chart;
function updateChart() {
    const categories = {};
    transactions.forEach(t => {
        if(t.type === 'expense') categories[t.category] = (categories[t.category] || 0) + +t.amount;
    });

    const data = {
        labels: Object.keys(categories),
        datasets: [{
            label: 'Expenses by Category',
            data: Object.values(categories),
            backgroundColor: ['#f87171','#60a5fa','#34d399','#facc15'],
        }]
    };

    if(chart) chart.destroy();
    chart = new Chart(expenseChart, {type: 'pie', data});
}

// Dark Mode
const toggleDark = document.getElementById('toggleDark');
toggleDark.addEventListener('click', () => {
    document.body.classList.toggle('bg-gray-900');
    document.body.classList.toggle('text-gray-200');
});

updateUI();
</script>
</body>
</html>
